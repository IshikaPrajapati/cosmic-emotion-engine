<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cosmic Emotion Engine</title>
<link rel="stylesheet" href="styles.css">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script defer src="camera/faceModelLoader.js"></script>
<script defer src="camera/emotionDetector.js"></script>
<script defer src="visuals/emotionColors.js"></script>
<script defer src="visuals/galaxyAnimation.js"></script>
<script defer src="audio/frequencyPlayer.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<h1>🌌 Cosmic Emotion Engine</h1>

<div class="container">

  <div class="camera-section">
    <h2>Camera</h2>
    <video id="video" autoplay muted></video>
    <p id="emotionText">Emotion: Not started</p>
    <button id="startCameraBtn">Start Camera</button>
  </div>

  <div class="manual-input">
    <h2>Or Enter Your Emotion</h2>
    <input type="text" id="emotionInput" placeholder="Type your emotion (e.g., happy, sad, calm)">
    <button id="submitEmotionBtn">Submit Emotion</button>
  </div>

  <div class="visual-section">
    <canvas id="galaxyCanvas"></canvas>
  </div>

  <div class="controls">
    <button onclick="playRelaxation()">Play Relaxation Sound</button>
  </div>

</div>

</body>
</html>
